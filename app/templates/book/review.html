{% extends "base.html" %}

{% block title %}Написать рецензию — {{ book.title }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
<style>
    .review-form {
        max-width: 800px;
        margin: 0 auto;
    }

    .markdown-content {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #dee2e6;
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="review-form">
        <div class="card">
            <div class="card-header">
                <h4>Написать рецензию</h4>
                <h5 class="mb-0 text-muted">{{ book.title }}</h5>
            </div>

            <div class="card-body">
                <form method="POST" action="{{ url_for('review.create', book_id=book.id) }}">
                    {{ form.csrf_token }}

                    <div class="mb-4">
                        <label class="form-label fw-bold">Ваша оценка <span class="text-danger">*</span></label>
                        <select name="rating" class="form-select form-select-lg" required>
                            <option value="5" selected>5 — Отлично</option>
                            <option value="4">4 — Хорошо</option>
                            <option value="3">3 — Удовлетворительно</option>
                            <option value="2">2 — Неудовлетворительно</option>
                            <option value="1">1 — Плохо</option>
                            <option value="0">0 — Ужасно</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Текст рецензии</label>
                        <textarea id="text"
                                  name="text"
                                  class="form-control"
                                  rows="10"
                                  placeholder="Напишите вашу рецензию... (поддерживается Markdown)">{{ form.text.data if form.text.data else '' }}</textarea>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary btn-lg px-5">
                            Опубликовать рецензию
                        </button>
                        <a href="{{ url_for('book.detail', book_id=book.id) }}"
                           class="btn btn-secondary btn-lg">
                            Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
<script>
    const easyMDE = new EasyMDE({
        element: document.getElementById('text')
    });
</script>
{% endblock %}
